services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agency
      POSTGRES_PASSWORD: agency
      POSTGRES_DB: agency_brain
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agency -d agency_brain"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: